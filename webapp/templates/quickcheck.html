<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quick Check · NeuroGolf</title>
<style>
:root{
 --bg:#05060c; --panel:rgba(255,255,255,.045); --panel2:rgba(255,255,255,.07);
 --line:rgba(255,255,255,.09); --txt:#e8ecf4; --dim:#8b93a7;
 --cyan:#22d3ee; --green:#34d399; --amber:#fbbf24; --violet:#a78bfa; --red:#fb7185;
 --glow-green:0 0 14px rgba(52,211,153,.55);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,Inter,sans-serif;background:var(--bg);color:var(--txt);
 background-image:radial-gradient(900px 500px at 10% -10%,rgba(34,211,238,.1),transparent 60%),
   radial-gradient(800px 500px at 100% 0,rgba(167,139,250,.12),transparent 55%);background-attachment:fixed}
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(16px);background:linear-gradient(180deg,rgba(8,10,18,.92),rgba(8,10,18,.6));
 border-bottom:1px solid var(--line);padding:14px 24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
a.back{color:var(--cyan);text-decoration:none;font-size:14px;padding:6px 12px;border:1px solid var(--line);border-radius:10px;transition:.15s}
a.back:hover{background:var(--panel);transform:translateX(-2px)}
h2{margin:0;font-size:18px;letter-spacing:.5px}
.note{font-size:12.5px;color:var(--dim)}
.spacer{margin-left:auto}
input,textarea,.btn{font-family:inherit;background:var(--panel);color:var(--txt);border:1px solid var(--line);
 border-radius:10px;padding:9px 12px;font-size:13px}
input#taskNum{width:110px;font-weight:700;letter-spacing:.5px}
.btn{cursor:pointer;font-weight:700;transition:.16s}
.btn.run{background:linear-gradient(135deg,#0ea5b7,#34d399);color:#03120c;border:0;box-shadow:0 6px 22px rgba(52,211,153,.4)}
.btn.run:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(52,211,153,.5)}
.btn.ghost{color:var(--dim)}
.btn.ghost:hover{color:var(--txt);border-color:rgba(255,255,255,.25)}
.wrap{padding:22px 24px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;backdrop-filter:blur(10px)}
.col{flex:1;min-width:420px}
h3{margin:0 0 12px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:600}
textarea#code{width:100%;height:440px;background:#02040a;color:#c9f2e6;border:1px solid var(--line);border-radius:12px;
 font-family:'Cascadia Code',Consolas,monospace;font-size:12.5px;line-height:1.5;padding:14px;resize:vertical;
 box-shadow:inset 0 0 40px rgba(34,211,238,.04)}
textarea#code:focus{outline:none;border-color:rgba(34,211,238,.4);box-shadow:inset 0 0 40px rgba(34,211,238,.06),0 0 0 1px rgba(34,211,238,.25)}
.summary{padding:12px 14px;border-radius:12px;background:#02040a;border:1px solid var(--line);font-size:13px;margin-top:14px}
.ok{color:var(--green)} .bad{color:var(--red)}
.badge{padding:3px 11px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.badge.ours{background:rgba(52,211,153,.16);color:var(--green)}
.badge.working{background:rgba(251,191,36,.16);color:var(--amber)}
.badge.experimenting{background:rgba(251,113,133,.16);color:var(--red)}
.badge.maxed{background:rgba(167,139,250,.16);color:var(--violet)}
.badge.todo{background:rgba(255,255,255,.08);color:var(--dim)}
.faillist{margin-top:10px;max-height:220px;overflow:auto;font-family:'Cascadia Code',Consolas,monospace;font-size:11.5px}
.failrow{display:flex;gap:10px;padding:5px 8px;border-radius:7px}
.failrow:nth-child(odd){background:rgba(255,255,255,.03)}
.failrow .tag{color:var(--amber);min-width:120px}
.failrow .tag.exc{color:var(--red)}
.term{white-space:pre-wrap;font-family:'Cascadia Code',Consolas,monospace;font-size:12px;line-height:1.5;
 background:#02040a;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:14px;
 max-height:300px;overflow:auto;color:#c9f2e6}
.term:empty{display:none}
.term .err{color:var(--red)}
.graphbox{margin-top:14px;text-align:center;background:#0b0f18;border-radius:12px;padding:10px;display:none}
.graphbox img{max-width:100%;border-radius:8px}
</style></head>
<body>
<header>
 <a class="back" href="/">← mission control</a>
 <h2>🧪 Quick Check</h2>
 <span class="note">standalone scratch runner — separate from each task's own editor/history, so pasting here never touches your in-progress work there.</span>
 <div class="spacer"></div>
</header>
<div class="wrap">
 <div class="col card">
  <h3>◈ paste your model code</h3>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
   <label class="note" for="taskNum">task #</label>
   <input id="taskNum" type="number" min="1" max="400" placeholder="e.g. 355">
   <span id="badge" class="badge todo" style="display:none"></span>
   <span id="pts" class="note"></span>
  </div>
  <textarea id="code" spellcheck="false" placeholder="# Paste code that sets a top-level `model` = onnx.ModelProto&#10;# (same convention as repairs/user_code/taskNNN.py)"></textarea>
  <div style="margin-top:14px;display:flex;gap:10px">
    <button class="btn run" onclick="runCheck()">▶ Run &amp; Verify</button>
    <button class="btn ghost" onclick="clearAll()">clear</button>
  </div>
 </div>
 <div class="col card">
  <h3>◈ result</h3>
  <div id="summary" class="summary">Enter a task number, paste code, click Run &amp; Verify.</div>
  <div id="faillist" class="faillist"></div>
  <div class="graphbox" id="graphbox"><img id="graphimg" alt="onnx graph"></div>
  <h3 style="margin-top:16px">◈ terminal output</h3>
  <div id="term" class="term"></div>
 </div>
</div>
<script>
function clearAll(){
 document.getElementById('code').value='';
 document.getElementById('summary').innerHTML='Enter a task number, paste code, click Run &amp; Verify.';
 document.getElementById('faillist').innerHTML='';
 document.getElementById('term').textContent='';
 document.getElementById('graphbox').style.display='none';
 document.getElementById('badge').style.display='none';
 document.getElementById('pts').textContent='';
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function runCheck(){
 const t=document.getElementById('taskNum').value;
 const code=document.getElementById('code').value;
 const sum=document.getElementById('summary'), fl=document.getElementById('faillist'), term=document.getElementById('term');
 if(!t){sum.innerHTML='<span class="bad">enter a task number first</span>';return;}
 sum.innerHTML='⏳ running…'; fl.innerHTML=''; term.textContent=''; document.getElementById('graphbox').style.display='none';
 fetch('/api/quickcheck',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:t,code})})
 .then(r=>r.json()).then(j=>{
   if(!j.ok){sum.innerHTML='<span class="bad">❌ '+esc(j.error)+'</span>';return;}
   const badge=document.getElementById('badge'), pts=document.getElementById('pts');
   if(j.state){badge.style.display='inline-block';badge.textContent=j.state;badge.className='badge '+j.state;}
   if(j.base_points!=null)pts.textContent='baseline '+j.base_points.toFixed(2)+' pts';
   if(j.log)term.textContent=j.log;

   if(j.stage==='exec_error'){sum.innerHTML='<span class="bad">❌ Python error while building the model — see terminal output below</span>';return;}
   if(j.stage==='no_model'){sum.innerHTML='<span class="bad">❌ no `model` variable was set — see terminal output below</span>';return;}
   if(j.stage==='audit_error'){sum.innerHTML='<span class="bad">❌ error while auditing the model — see terminal output below</span>';return;}
   if(j.stage==='invalid'){sum.innerHTML='<span class="bad">❌ invalid ONNX model — see terminal output below</span>';return;}

   if(j.solved){
     let cmpNote='';
     if(j.base_points!=null){
       let rel='below';
       if(j.points>j.base_points)rel='beats'; else if(j.points===j.base_points)rel='ties';
       cmpNote=' (baseline '+j.base_points.toFixed(2)+', '+rel+' baseline)';
     }
     sum.innerHTML='<span class="ok">✅ SOLVED — 0 fails · cost '+j.cost+' · '+j.points+' pts'+cmpNote+
       ' · '+j.n_nodes+' nodes — saved &amp; marked \'ours\' automatically</span>';
   } else {
     sum.innerHTML='<span class="bad">⚠ '+j.n_fail+' example(s) failed'+(j.cost?(' · cost '+j.cost):'')+' — not saved, marked \'working\'</span>';
     if(j.fails && j.fails.length){
       fl.innerHTML='<div class="note" style="margin-bottom:6px">failing on (split[index within split] / combined #):</div>'+
         j.fails.map(f=>'<div class="failrow"><span class="tag'+(f.kind==='exception'?' exc':'')+'">'+f.split+'['+f.idx+'] (#'+f.combined+')</span><span>'+
           (f.kind==='exception'?'exception: ':'')+esc(f.detail)+'</span></div>').join('') +
         (j.n_fail>j.fails.length?('<div class="note" style="margin-top:6px">…and '+(j.n_fail-j.fails.length)+' more not listed</div>'):'');
     }
   }
   if(j.graph){document.getElementById('graphimg').src=j.graph;document.getElementById('graphbox').style.display='block';}
 })
 .catch(e=>{sum.innerHTML='<span class="bad">request failed: '+esc(String(e))+'</span>';});
}
</script>
</body></html>
